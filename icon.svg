<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#007aff"/>
      <stop offset="100%" stop-color="#00c6ff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- ₪ symbol -->
  <text x="50%" y="40%" text-anchor="middle" font-size="140" fill="white" font-family="Arial" font-weight="bold">
    ₪
  </text>

  <!-- Shafirs text -->
  <text x="50%" y="70%" text-anchor="middle" font-size="60" fill="white" font-family="Arial" font-weight="600">
    Shafirs
  </text>
</svg>
