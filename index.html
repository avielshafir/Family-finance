<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ניהול תנועות</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {font-family: Arial; background:#f5f7fa; padding:20px;}
.container {max-width:500px; margin:auto; background:white; padding:20px; border-radius:16px;}
input, select {width:100%; padding:10px; margin-top:8px;}
button {margin-top:20px; padding:15px; width:100%; background:#007aff; color:white; border:none;}
</style>
</head>

<body>
<div class="container">

<h2>הוספת תנועה</h2>

<label>תאריך</label>
<input type="date" id="date">

<label>אמצעי תשלום</label>
<select id="paymentMethod">
  <option>כרטיס אשראי</option>
  <option>הוראת קבע</option>
  <option>העברה בנקאית</option>
</select>

<label>תאריך חיוב</label>
<input type="date" id="chargeDate">

<label>סכום לתשלום</label>
<input type="number" id="amount">

<label>סוג פעולה</label>
<select id="type">
  <option>הוצאה</option>
  <option>הכנסה</option>
</select>

<label>תיאור</label>
<input type="text" id="description">

<label>קטגוריה</label>
<select id="category">
  <option>מזון</option>
  <option>דלק</option>
</select>

<label>אחראי</label>
<select id="owner">
  <option>אני</option>
  <option>אשתי</option>
</select>

<label>אופן הוצאה/הכנסה</label>
<select id="flowType">
  <option>קבוע</option>
  <option>משתנה</option>
</select>

<label>מס' תשלום</label>
<input type="number" id="paymentNumber">

<label>מתוך תשלומים</label>
<input type="number" id="totalPayments">

<button onclick="submitData()">שמור</button>

<p id="status"></p>

</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbxkU18Y2sWnVJCuYbu4T_cgCkFC1ds_SHOi7FkL9wKm5ZPciiP3UKgIKbp9h1AngkKE/exec";

function calculateChargeDate() {
  const date = new Date(document.getElementById("date").value);
  const method = document.getElementById("paymentMethod").value;

  if (!date) return;

  if (method === "הוראת קבע" || method === "העברה בנקאית") {
    return date;
  }

  const day = date.getDate();
  if (day <= 9) {
    return new Date(date.getFullYear(), date.getMonth(), 10);
  } else {
    return new Date(date.getFullYear(), date.getMonth()+1, 10);
  }
}

function updateCharge() {
  const charge = calculateChargeDate();
  if (!charge) return;
  document.getElementById("chargeDate").value = charge.toISOString().split("T")[0];
}

document.getElementById("date").addEventListener("change", updateCharge);
document.getElementById("paymentMethod").addEventListener("change", updateCharge);

function submitData() {

  const data = {
    date: document.getElementById("date").value,
    chargeDate: document.getElementById("chargeDate").value,
    amount: document.getElementById("amount").value,
    type: document.getElementById("type").value,
    description: document.getElementById("description").value,
    category: document.getElementById("category").value,
    paymentMethod: document.getElementById("paymentMethod").value,
    owner: document.getElementById("owner").value,
    flowType: document.getElementById("flowType").value,
    paymentNumber: document.getElementById("paymentNumber").value,
    totalPayments: document.getElementById("totalPayments").value
  };

  fetch(scriptURL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(() => {
    document.getElementById("status").innerHTML = "✅ נשמר בהצלחה";

    document.querySelectorAll("input").forEach(e => e.value = "");
  })
  .catch((err) => {
    console.error(err);
    document.getElementById("status").innerHTML = "❌ שגיאה בשליחה";
  });
}
</script>

</body>
</html>
