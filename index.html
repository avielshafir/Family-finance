<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ניהול תנועות</title>

<style>
body {font-family: Arial; background:#f2f4f7; padding:15px;}
.container {max-width:520px; margin:auto; background:white; padding:20px; border-radius:16px;}
h2 {text-align:center;}
label {margin-top:10px; display:block; font-weight:bold;}
input, select {width:100%; padding:10px; margin-top:5px; border-radius:8px; border:1px solid #ccc;}
button {margin-top:20px; padding:15px; width:100%; background:#007aff; color:white; border:none; border-radius:12px; font-size:16px;}
button:disabled {background:#999;}
#status {text-align:center; margin-top:10px;}
</style>
</head>

<body>

<div class="container">
<h2>הוספת תנועה</h2>

<label>תאריך</label>
<input type="date" id="date">

<label>אמצעי תשלום</label>
<select id="paymentMethod"></select>

<label>תאריך חיוב</label>
<input type="date" id="chargeDate">

<label>סכום לתשלום</label>
<input type="number" id="amount">

<label>סוג פעולה</label>
<select id="type"></select>

<label>תיאור</label>
<input type="text" id="description">

<label>קטגוריה</label>
<select id="category"></select>

<label>אחראי</label>
<select id="owner"></select>

<label>אופן הוצאה/הכנסה</label>
<select id="flowType"></select>

<label>מס' תשלום</label>
<input type="number" id="paymentNumber">

<label>מתוך תשלומים</label>
<input type="number" id="totalPayments">

<button id="submitBtn" onclick="submitData()">שמור</button>
<p id="status"></p>

</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbyhqjtKnp9Di_bHUoH3qME2dgLbXUr5XA5oEA5U9o-1z6hPFyRHWe6v4zgGEOYkCtPH/exec";

// 🔄 טעינת Dropdownים מה-Sheet
fetch(scriptURL)
.then(res => res.json())
.then(data => {
  fillSelect("paymentMethod", data["אמצעי תשלום"]);
  fillSelect("category", data["קטגוריה"]);
  fillSelect("owner", data["אחראי"]);
  fillSelect("flowType", data["אופן הוצאה/הכנסה"]);
  fillSelect("type", data["סוג פעולה"]);

  loadLastValues();
});

// 🧩 מילוי Dropdown
function fillSelect(id, values){
  const select = document.getElementById(id);
  select.innerHTML = "";
  values.forEach(v=>{
    const opt = document.createElement("option");
    opt.value = v;
    opt.textContent = v;
    select.appendChild(opt);
  });
}
  function formatDate(dateStr){
  if(!dateStr) return "";
  const [y,m,d] = dateStr.split("-");
  return `${d}/${m}/${y}`;
}

// 🧠 שמירת ערכים אחרונים
function saveLastValues(){
  localStorage.setItem("paymentMethod", paymentMethod.value);
  localStorage.setItem("category", category.value);
  localStorage.setItem("owner", owner.value);
}

// 🔁 טעינת ערכים אחרונים
function loadLastValues(){
  if(localStorage.getItem("paymentMethod")) paymentMethod.value = localStorage.getItem("paymentMethod");
  if(localStorage.getItem("category")) category.value = localStorage.getItem("category");
  if(localStorage.getItem("owner")) owner.value = localStorage.getItem("owner");
}

// 🧠 חישוב תאריך חיוב
function calculateChargeDate() {
  const date = new Date(dateInput.value);
  const method = paymentMethod.value;

  if (!date) return;

  if (method === "הוראת קבע" || method === "העברה בנקאית") {
    return date;
  }

  const day = date.getDate();
  if (day <= 9) {
    return new Date(date.getFullYear(), date.getMonth(), 10);
  } else {
    return new Date(date.getFullYear(), date.getMonth()+1, 10);
  }
}

const dateInput = document.getElementById("date");

dateInput.addEventListener("change", updateCharge);
paymentMethod.addEventListener("change", updateCharge);

function updateCharge(){
  const charge = calculateChargeDate();
  if (!charge) return;
  chargeDate.value = charge.toISOString().split("T")[0];
}

// 🚀 שליחה
function submitData(){

  submitBtn.disabled = true;
  status.innerHTML = "⏳ שומר...";

  const data = {
  date: formatDate(date.value),
  chargeDate: formatDate(chargeDate.value),
  amount: amount.value,
  type: type.value,
  description: description.value,
  category: category.value,
  paymentMethod: paymentMethod.value,
  owner: owner.value,
  flowType: flowType.value,
  paymentNumber: paymentNumber.value,
  totalPayments: totalPayments.value
};

  fetch(scriptURL, {
    method: "POST",
    mode: "no-cors",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data)
  })
  .then(() => {
    status.innerHTML = "✅ נשמר בהצלחה";
    saveLastValues();

    document.querySelectorAll("input").forEach(e=>e.value="");
    submitBtn.disabled = false;
  })
  .catch(()=>{
    status.innerHTML = "❌ שגיאה";
    submitBtn.disabled = false;
  });
}
</script>

</body>
</html>
