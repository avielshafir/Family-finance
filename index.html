<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>ניהול תנועות</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f5f7fa;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
    }

    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-top: 5px;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 15px;
      background: #007aff;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
    }

    .success {
      color: green;
      text-align: center;
    }

    .error {
      color: red;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>הוספת תנועה</h2>

  <label>תאריך עסקה</label>
  <input type="date" id="date">

  <label>אמצעי תשלום</label>
  <select id="paymentMethod">
    <option>כרטיס אשראי</option>
    <option>הוראת קבע</option>
    <option>העברה בנקאית</option>
    <option>מזומן</option>
  </select>

  <label>תאריך חיוב צפוי</label>
  <input type="date" id="chargeDate">

  <label>תיאור</label>
  <input type="text" id="description">

  <label>סכום</label>
  <input type="number" id="amount">

  <label>סוג</label>
  <select id="type">
    <option>הוצאה</option>
    <option>הכנסה</option>
  </select>

  <label>הערות</label>
  <textarea id="notes"></textarea>

  <button onclick="submitData()">שמור</button>

  <p id="status"></p>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbxO-jX-m7EalAJ6nhb6i5FwQZAnpFR9Ejkk6yhiooh0u9kA2uUT9WF5BV5iPGrx_S5u/exec";

function calculateChargeDate() {
  const date = new Date(document.getElementById("date").value);
  const method = document.getElementById("paymentMethod").value;

  if (!date) return;

  const immediate = ["הוראת קבע", "העברה בנקאית"];

  if (immediate.includes(method)) {
    return date;
  }

  const day = date.getDate();

  if (day <= 9) {
    return new Date(date.getFullYear(), date.getMonth(), 10);
  } else {
    return new Date(date.getFullYear(), date.getMonth() + 1, 10);
  }
}

document.getElementById("date").addEventListener("change", updateCharge);
document.getElementById("paymentMethod").addEventListener("change", updateCharge);

function updateCharge() {
  const charge = calculateChargeDate();
  if (!charge) return;

  const formatted = charge.toISOString().split("T")[0];
  document.getElementById("chargeDate").value = formatted;
}

function submitData() {
  const data = {
    date: document.getElementById("date").value,
    chargeDate: document.getElementById("chargeDate").value,
    description: document.getElementById("description").value,
    amount: document.getElementById("amount").value,
    type: document.getElementById("type").value,
    paymentMethod: document.getElementById("paymentMethod").value,
    category: "",
    subCategory: "",
    account: "",
    isFixed: "",
    notes: document.getElementById("notes").value
  };

  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(() => {
    document.getElementById("status").innerHTML = "✅ נשמר בהצלחה";
    document.querySelectorAll("input, textarea").forEach(el => el.value = "");
  })
  .catch(() => {
    document.getElementById("status").innerHTML = "❌ שגיאה בשליחה";
  });
}
</script>

</body>
</html>
